<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NUTECH 360° Virtual Tour — Explore the Campus</title>
    <meta name="description" content="Explore the National University of Technology (NUTECH) campus with an immersive 360-degree virtual tour. Navigate through buildings, gardens, and landmarks." />
    <meta name="theme-color" content="#11584D" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
</head>
<body>

<!-- ===== VIEWER CONTAINER ===== -->
<div id="viewer"></div>

<!-- ===== WELCOME SCREEN ===== -->
<div id="welcome-overlay">
    <div class="welcome-content">
        <div class="welcome-badge">
            <span class="badge-dot"></span>
            360° Virtual Experience
        </div>
        <h1>Welcome to NUTECH</h1>
        <p class="welcome-subtitle">National University of Technology &mdash; Campus Virtual Tour</p>
        <button id="start-btn">Start Tour</button>
        <p class="welcome-footer">Best experienced on desktop &bull; Click &amp; drag to explore</p>
    </div>
</div>

<!-- ===== TUTORIAL MODAL ===== -->
<div id="tutorial-overlay">
    <div id="tutorial-box">
        <div id="tutorial-dots" class="tutorial-dots"></div>
        <div class="tutorial-icon-wrapper" id="tutorial-icon"></div>
        <h2 id="tutorial-title"></h2>
        <div id="tutorial-step-indicator"></div>
        <p id="tutorial-text"></p>
        <div class="tutorial-btns">
            <button id="tutorial-skip-btn">Skip</button>
            <button id="tutorial-next-btn">Next</button>
        </div>
    </div>
</div>

<!-- ===== MINIMAP ===== -->
<button id="minimap-toggle" title="Campus Map">&#128506;</button>
<div id="minimap">
    <div id="minimap-title">Campus Map</div>
    <canvas id="minimap-canvas"></canvas>
</div>

<!-- ===== THUMBNAIL GALLERY ===== -->
<button id="gallery-toggle" title="Quick View Gallery">&#9871;</button>
<div id="gallery-panel">
    <h3>Quick View</h3>
    <div class="gallery-grid" id="gallery-grid"></div>
</div>

<!-- ===== SCENE LABEL ===== -->
<div id="scene-label"></div>

<!-- ===== APP ENTRY ===== -->
<script type="module" src="/src/main.js"></script>

</body>
</html>
